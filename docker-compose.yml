services:
  postgres:
    image: postgres:16-alpine
    container_name: otp2fa-postgres
    environment:
      POSTGRES_DB: otp2fa
      POSTGRES_USER: otp2fa
      POSTGRES_PASSWORD: otp2fa
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U otp2fa -d otp2fa"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: otp2fa-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  mailpit:
    image: axllent/mailpit:latest
    container_name: otp2fa-mailpit
    ports:
      - "1025:1025"   # SMTP (앱 → Mailpit)
      - "8025:8025"   # Web UI (http://localhost:8025)

volumes:
  postgres_data:
  redis_data:
