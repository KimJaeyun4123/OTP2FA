# ===================================
# Server
# ===================================
server.port=8080

# ===================================
# DataSource (PostgreSQL)
# ===================================
spring.datasource.url=jdbc:postgresql://localhost:5432/otp2fa
spring.datasource.username=otp2fa
spring.datasource.password=otp2fa
spring.datasource.driver-class-name=org.postgresql.Driver

# ===================================
# JPA / Hibernate
# ===================================
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# ===================================
# Redis
# ===================================
spring.data.redis.host=localhost
spring.data.redis.port=6379

# OTP 정책
otp.ttl-seconds=300
otp.resend-cooldown-seconds=60
otp.max-attempts=5
otp.lock-seconds=1800

# ===================================
# Mail (Mailpit - 로컬 개발)
# ===================================
spring.mail.host=localhost
spring.mail.port=1025
spring.mail.properties.mail.smtp.auth=false
spring.mail.properties.mail.smtp.starttls.enable=false

otp.mail.from=no-reply@otp2fa.local

# ===================================
# Firebase (Push)
# ===================================
# Firebase 서비스 계정 JSON 파일 경로 (classpath 또는 절대경로)
firebase.service-account-path=classpath:firebase-service-account.json

# ===================================
# Twilio (SMS)
# ===================================
twilio.account-sid=YOUR_TWILIO_ACCOUNT_SID
twilio.auth-token=YOUR_TWILIO_AUTH_TOKEN
twilio.from-phone=+1XXXXXXXXXX

# ===================================
# Logging
# ===================================
logging.level.com.study.otp2fa=DEBUG
logging.level.org.hibernate.SQL=DEBUG
logging.level.org.hibernate.orm.jdbc.bind=TRACE
